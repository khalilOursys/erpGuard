# HTTP -> HTTPS redirect + acme challenge
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name oursys-dev.site www.oursys-dev.site;

  # ACME challenge location
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect everything else to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS server block
server {
  listen 443 ssl http2;
  server_name oursys-dev.site www.oursys-dev.site;

  ssl_certificate /etc/letsencrypt/live/oursys-dev.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/oursys-dev.site/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Increase upload body size if needed
  client_max_body_size 100M;

  # Root/Frontend proxy (adjust path rules if your app differs)
  location / {
    proxy_pass http://oursys_frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  # API -> backend
  location /api/ {
    rewrite ^/api/(.*) /$1 break;
    proxy_pass http://oursys_server:3001/;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  # uploads if backend serves them
  location /uploads/ {
    proxy_pass http://oursys_server:3001/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # basic health path
  location /health {
    return 200 "OK";
  }
}
