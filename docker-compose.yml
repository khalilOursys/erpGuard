services:
  db:
    image: postgres:15
    container_name: oursys_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oursysdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # optional: pgadmin if you want it, but DON'T expose it if Brooklyn already uses 8081
  # Uncomment and change host port only if needed and unique
  # pgadmin:
  #   image: dpage/pgadmin4:7
  #   container_name: oursys_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
  #   # only expose if you need web UI and choose a free host port:
  #   # ports:
  #   #   - "8082:80"
  #   volumes:
  #   - ./pgadmin_data:/var/lib/pgadmin

  oursys_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: oursys_server
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}   # set in top-level .env or server/.env
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    restart: unless-stopped

  oursys_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oursys_frontend
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - oursys_server
    restart: unless-stopped

# No nginx here — we'll let Brooklyn nginx proxy to these by container name
volumes:
  pgdata:
  pgadmin_data:
