services:
  db:
    image: postgres:15
    container_name: oursys_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oursysdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  oursys_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: oursys_server
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    restart: unless-stopped

  oursys_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oursys_frontend
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - oursys_server
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: oursys_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot:/var/www/certbot:rw
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - oursys_frontend
      - oursys_server
    networks:
      - default

# persistent volumes (your existing ones)
volumes:
  pgdata:
  pgadmin_data:

# networks (default is fine)
networks:
  default:
    name: oursys_network